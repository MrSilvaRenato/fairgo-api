server {
    listen 80;
    server_name fairgo.com.au www.fairgo.com.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fairgo.com.au www.fairgo.com.au;

    root /var/www/fairgo-api/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/fairgo.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fairgo.com.au/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Serve built React SPA (dist/ files are copied to public/)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel API
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
