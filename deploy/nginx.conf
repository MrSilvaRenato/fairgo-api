# /etc/nginx/sites-available/fairgo
# Aus Fair Go — ausfairgo.com.au
# Laravel API + React SPA served from the same domain.
# React build lives at /var/www/fairgo/public/app/
# Laravel API served via PHP-FPM from /var/www/fairgo/public/

server {
    listen 80;
    server_name ausfairgo.com.au www.ausfairgo.com.au;
    # Certbot will upgrade this to HTTPS and redirect HTTP → HTTPS automatically.

    root /var/www/fairgo/public/app;
    index index.html;

    # ── Laravel API ──────────────────────────────────────────────────────
    # All /api/* requests are routed to Laravel's index.php via PHP-FPM.
    location /api/ {
        root /var/www/fairgo/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/fairgo/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # ── Sitemap & robots ─────────────────────────────────────────────────
    location = /sitemap.xml {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/fairgo/public/index.php;
        fastcgi_param REQUEST_URI /sitemap.xml;
        include fastcgi_params;
    }

    location = /robots.txt {
        root /var/www/fairgo/public/app;
        access_log off;
    }

    # ── React SPA ────────────────────────────────────────────────────────
    # Static assets (JS/CSS/images) are served directly.
    # Any non-file route falls back to index.html (React Router handles it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript application/x-javascript
        application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Cache static assets aggressively ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    client_max_body_size 20M;
    access_log /var/log/nginx/fairgo-access.log;
    error_log  /var/log/nginx/fairgo-error.log;
}
