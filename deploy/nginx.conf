server {
    server_name ausfairgo.com.au www.ausfairgo.com.au;

    root /var/www/fairgo/public/app;
    index index.html;

    # ── Laravel API ──────────────────────────────────────────────────────
    location /api/ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/fairgo/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        include fastcgi_params;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── Sitemap & robots ─────────────────────────────────────────────────
    location = /sitemap.xml {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/fairgo/public/index.php;
        fastcgi_param REQUEST_URI /sitemap.xml;
        fastcgi_param REQUEST_METHOD $request_method;
        include fastcgi_params;
    }

    location = /robots.txt {
        root /var/www/fairgo/public/app;
        access_log off;
    }

    # ── React SPA ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Cache static assets ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    client_max_body_size 20M;
    access_log /var/log/nginx/fairgo-access.log;
    error_log  /var/log/nginx/fairgo-error.log;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/ausfairgo.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ausfairgo.com.au/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.ausfairgo.com.au) { return 301 https://$host$request_uri; }
    if ($host = ausfairgo.com.au) { return 301 https://$host$request_uri; }
    listen 80;
    server_name ausfairgo.com.au www.ausfairgo.com.au;
    return 404;
}
